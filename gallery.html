<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Populace Audience Lab</title><style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f6f1;color:#20242a}
header{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;background:#fff;border-bottom:1px solid #e5e7df;position:sticky;top:0;z-index:2}
.brand{font-weight:800;letter-spacing:.02em}.brand small{display:block;font-weight:500;letter-spacing:.28em;color:#8b9199;font-size:10px;margin-top:2px}
.btn{display:inline-block;text-decoration:none;color:#fff;background:#587c0b;padding:10px 16px;border-radius:10px;font-weight:700}
main{max-width:1500px;margin:0 auto;padding:28px}h1{margin:0 0 8px;font-size:clamp(24px,3vw,42px)}.sub{margin:0 0 24px;color:#737a84}
.gallery{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:20px}.card{background:#fff;border:1px solid #e1e4dc;border-radius:18px;padding:10px;box-shadow:0 8px 24px rgba(38,47,30,.06);cursor:zoom-in;transition:transform .2s ease,box-shadow .2s ease}
.card:hover{transform:translateY(-3px);box-shadow:0 14px 30px rgba(38,47,30,.12)}.card img{display:block;width:100%;height:auto;border-radius:12px}
.lightbox{display:none;position:fixed;inset:0;z-index:10;background:rgba(15,18,15,.88);align-items:center;justify-content:center;padding:30px}.lightbox.open{display:flex}
.lightbox img{max-width:96vw;max-height:92vh;object-fit:contain;border-radius:10px}.close{position:fixed;top:18px;right:24px;border:0;background:rgba(255,255,255,.14);color:#fff;font-size:34px;line-height:1;width:48px;height:48px;border-radius:50%;cursor:pointer}
@media(max-width:800px){main{padding:18px}.gallery{grid-template-columns:1fr}header{padding:14px 18px}}
</style></head>
<body>
<header><div class="brand">Populace <small>AUDIENCE LAB</small></div><a class="btn" href="open-demo.html" target="_blank" rel="noopener">Open Demo ↗</a></header>
<main><h1>Populace Audience Lab</h1><p class="sub">Original screenshots — click any image to enlarge.</p><section class="gallery"><div class="card"><img src="gallery-1.jpeg" alt="Screenshot 1"></div><div class="card"><img src="gallery-2.jpeg" alt="Screenshot 2"></div><div class="card"><img src="gallery-3.jpeg" alt="Screenshot 3"></div><div class="card"><img src="gallery-4.jpeg" alt="Screenshot 4"></div></section></main>
<div class="lightbox" id="lightbox"><button class="close" aria-label="Close">×</button><img id="lightboxImage" alt=""></div>
<script>
const box=document.getElementById('lightbox'), image=document.getElementById('lightboxImage');
document.querySelectorAll('.card img').forEach(img=>img.addEventListener('click',()=>{
  image.src=img.src; image.alt=img.alt; box.classList.add('open');
}));
function closeBox(){box.classList.remove('open');image.src='';}
document.querySelector('.close').addEventListener('click',closeBox);
box.addEventListener('click',e=>{if(e.target===box)closeBox();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeBox();});
</script></body></html>
